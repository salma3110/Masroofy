<!DOCTYPE html>
<html>
<head>
    <title>Expense History</title>
</head>
<body>

<h2>History</h2>

<ul>
{% for log in logs %}
    <li>
        {{ log.amount }} - {{ log.category.name }}
        <a href="{% url 'delete' log.id %}">Delete</a> <!-- ✅ use url tag -->
    </li>
{% empty %}
    <li>No expenses found.</li>
{% endfor %}
</ul>

<a href="{% url 'add' %}">Add New Expense</a>

</body>
</html>
